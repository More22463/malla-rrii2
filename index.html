<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Malla RRII</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ec,#d6f0ff);
padding:20px;
}

h1{
text-align:center;
}

.progress{
background:white;
border-radius:20px;
overflow:hidden;
margin:20px auto;
width:80%;
}

.progress-bar{
height:20px;
background:#ff7eb6;
width:0%;
transition:0.3s;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.year{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.semester{
margin-top:10px;
}

.subject{
padding:8px;
border-radius:8px;
margin:5px 0;
cursor:pointer;
background:#e0f4ff;
}

.subject.locked{
background:#ddd;
cursor:not-allowed;
}

.subject.done{
background:#ff9acb;
color:white;
}

.credit{
float:right;
font-size:12px;
opacity:0.7;
}

</style>

</head>

<body>

<h1>Malla Relaciones Internacionales</h1>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div class="grid">

<div class="year">

<h2>1° Año</h2>

<div class="semester">
<b>1° Semestre</b>

<div class="subject" data-id="eco" data-credits="5">
Economía <span class="credit">5</span>
</div>

<div class="subject" data-id="fil1" data-credits="4">
Filosofía I <span class="credit">4</span>
</div>

<div class="subject" data-id="histm" data-credits="5">
Historia del Mundo Contemporáneo <span class="credit">5</span>
</div>

<div class="subject" data-id="pol" data-credits="4">
Intro Ciencia Política <span class="credit">4</span>
</div>

</div>

<div class="semester">
<b>2° Semestre</b>

<div class="subject locked" data-id="fil2" data-req="fil1" data-credits="4">
Filosofía II <span class="credit">4</span>
</div>

<div class="subject locked" data-id="latam" data-req="histm" data-credits="5">
Historia de América Latina <span class="credit">5</span>
</div>

</div>

</div>

<div class="year">

<h2>2° Año</h2>

<div class="semester">
<b>1° Semestre</b>

<div class="subject locked" data-id="geo" data-req="eco" data-credits="5">
Geografía Económica <span class="credit">5</span>
</div>

<div class="subject locked" data-id="ri1" data-req="pol" data-credits="6">
Relaciones Internacionales I <span class="credit">6</span>
</div>

</div>

</div>

</div>

<script>

let subjects=document.querySelectorAll(".subject");

subjects.forEach(sub=>{

sub.addEventListener("click",()=>{

if(sub.classList.contains("locked")) return;

sub.classList.toggle("done");

updateUnlocks();
updateProgress();

});

});

function updateUnlocks(){

subjects.forEach(sub=>{

let req=sub.dataset.req;

if(!req) return;

let reqSub=document.querySelector(`[data-id='${req}']`);

if(reqSub.classList.contains("done")){
sub.classList.remove("locked");
}

});

}

function updateProgress(){

let total=0;
let done=0;

subjects.forEach(sub=>{
total+=parseInt(sub.dataset.credits||0);
if(sub.classList.contains("done")){
done+=parseInt(sub.dataset.credits||0);
}
});

let percent=(done/total)*100;

document.getElementById("progress").style.width=percent+"%";

}

</script>

</body>
</html>
